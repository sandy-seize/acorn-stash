name: cron-refresh-fundamentals
# 52주(≈252거래일) 최고/최저 갱신용. ⚠️ 비활성: 토스 키 IP 화이트리스트로
# 데이터센터 IP 차단(403). 수동(workflow_dispatch)만 — 평상시는 로컬 launchd.

on:
  workflow_dispatch: {}

concurrency:
  group: cron-refresh-fundamentals
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: hit refresh-prices (fundamentals)
        run: |
          code=$(curl -s -m 58 -o /tmp/out -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://acorn-stash.vercel.app/api/cron/refresh-prices?fundamentals=1")
          echo "status=$code"
          cat /tmp/out
          echo
          test "$code" = "200"
