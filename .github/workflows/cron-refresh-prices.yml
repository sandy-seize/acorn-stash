name: cron-refresh-prices
# 토스 Open API 실시세 주기 갱신용. ⚠️ 비활성: 토스 키가 IP 화이트리스트라
# GitHub/Vercel 데이터센터 IP는 403 "IP address not allowed". 자동 스케줄을
# 끄고 수동(workflow_dispatch)만 남김 — 허용된 egress(고정 IP 프록시 등)가
# 생기면 schedule 을 되살릴 것. 평상시 갱신은 로컬 launchd 가 담당.

on:
  workflow_dispatch: {}

concurrency:
  group: cron-refresh-prices
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: hit refresh-prices
        run: |
          code=$(curl -s -m 55 -o /tmp/out -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://acorn-stash.vercel.app/api/cron/refresh-prices")
          echo "status=$code"
          cat /tmp/out
          echo
          test "$code" = "200"
