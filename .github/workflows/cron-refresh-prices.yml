name: cron-refresh-prices
# 토스 Open API 실시세를 종목 모니터에 주기 갱신(현재가·1D 등락·거래량·시총).
# Vercel Hobby cron 은 하루 1회 한계 → GitHub Actions 로 촘촘히 호출.
# 52주 고저 같은 펀더멘털은 cron-refresh-fundamentals(일 1회)에서 별도 처리.

on:
  schedule:
    - cron: "*/30 * * * *" # 매 30분 (UTC)
  workflow_dispatch: {}

concurrency:
  group: cron-refresh-prices
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: hit refresh-prices
        run: |
          code=$(curl -s -m 55 -o /tmp/out -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://acorn-stash.vercel.app/api/cron/refresh-prices")
          echo "status=$code"
          cat /tmp/out
          echo
          test "$code" = "200"
